name: Full App Automation -> Slack

# Runs the ENTIRE AltTester UI suite (login, registration, regression, stories,
# wordfun) on push to main, once a day, and on demand — and reports to Slack.
# This is the full automation, not a sanity check (that's ci.yml).
#
# IMPORTANT: these tests drive a real device, so this job needs a **self-hosted
# runner** registered on the Windows machine that has the Pixel attached, the
# instrumented app installed, and either AltTester Desktop OR the bundled relay
# (tools/altserver_relay.py) available. GitHub's cloud runners cannot run it
# (no device; and the app is arm64 IL2CPP so a cloud emulator can't run it).
#
# Set up once: Repo -> Settings -> Actions -> Runners -> New self-hosted runner
# (Windows), (default labels self-hosted,windows are enough). Add repo secret SLACK_WEBHOOK_URL (the
# framework's SlackReporter posts results there).
#
# Prefer no CI runner? Use scripts/run_daily.ps1 with Windows Task Scheduler
# instead (see README) — same full suite, same Slack report, no runner needed.

on:
  push:
    branches: [main]
  schedule:
    - cron: "30 1 * * *" # 07:00 IST (01:30 UTC) daily
  workflow_dispatch:

jobs:
  ui-tests:
    runs-on: [self-hosted, windows]
    # The runner has no pwsh (Actions' default shell on Windows); use built-in
    # Windows PowerShell for every run: step.
    defaults:
      run:
        shell: powershell
    env:
      ALT_HOST: "127.0.0.1"
      ALT_PORT: "13000"
      # The installed APK registers as __default__; a fresh build uses
      # EnglishGurukulStudentApp. Override here to match what's installed.
      ALT_APP_NAME: "__default__"
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start AltServer relay (license-free) + adb reverse + fresh app launch
        run: |
          $pkg = "com.OritSciencesPrivateLimited.EnglishGurukul.student"
          Start-Process python -ArgumentList "-u","tools/altserver_relay.py","--host","127.0.0.1","--port","13000"
          Start-Sleep -Seconds 3
          adb reverse tcp:13000 tcp:13000
          # clear app data so the suite starts at a clean login screen (login tests need it)
          adb shell pm clear $pkg
          adb shell monkey -p $pkg -c android.intent.category.LAUNCHER 1
          python scripts/check_server.py
          # A fresh-cleared app takes 1-2 min to boot + connect to the relay; wait
          # until AltDriver can actually reach it before running the suite, so the
          # first tests don't error with a connection timeout.
          $ok = $false
          for ($i = 0; $i -lt 20; $i++) {
            python -c "from alttester import AltDriver; a=AltDriver(host='127.0.0.1',port=13000,app_name='__default__',timeout=8); print('scene:', a.get_current_scene()); a.stop()"
            if ($LASTEXITCODE -eq 0) { $ok = $true; break }
            Start-Sleep -Seconds 8
          }
          if (-not $ok) { Write-Host "WARNING: app did not connect to the relay within ~2.5 min" }

      - name: Run UI suite (tests self-report to Slack)
        run: pytest -v -ra --html=reports/report.html --self-contained-html

      - name: Upload report + screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: student-ui-report
          path: |
            reports/
            screenshots/
            logs/
          if-no-files-found: ignore
